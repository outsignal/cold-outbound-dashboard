<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Outsignal LinkedIn Connector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- View 1: Connect with invite token -->
  <div id="login-view" class="view">
    <div class="logo">Outsignal</div>
    <p class="subtitle">Paste your invite token to connect:</p>
    <form id="login-form">
      <input type="text" id="invite-token" placeholder="Invite token" required autocomplete="off" spellcheck="false">
      <button type="submit" id="login-btn" class="primary-btn">Connect</button>
    </form>
    <div id="login-error" class="error hidden"></div>
  </div>

  <!-- View 2: Connected / Status -->
  <div id="status-view" class="view hidden">
    <div class="logo">Outsignal</div>
    <div id="status-indicator" class="status-circle status-gray">
      <span id="status-icon">&#8212;</span>
    </div>
    <div id="status-text" class="status-text">Checking...</div>
    <div id="status-meta" class="status-meta"></div>
    <button id="connect-btn" class="primary-btn">Connect LinkedIn</button>
    <button id="logout-btn" class="text-btn">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
